name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── macOS: arm64 + x64 DMG ───────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/gen-icons.js

      - name: Build & publish (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — leave blank for unsigned builds.
          # To sign: add CSC_LINK (base64 .p12) and CSC_KEY_PASSWORD secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run release -- --mac

  # ── Windows: x64 NSIS installer ──────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/gen-icons.js

      - name: Build & publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --win
